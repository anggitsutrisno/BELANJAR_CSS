<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan properti</title>
    <style>
        /* color berfungsi untuk pemberian warna pada text */
        #color {
            color: tomato;
            /* font-size adalah untuk mengubah size dari font */
            font-size: 20px;
            /* font-family adalah untuk mengubah font dati text */
            font-family: Arial, Helvetica, sans-serif;
            /* text-align adalah digunkan untuk mengatur susunan text */
            text-align: center;
            /* background-color adalah digunakan untuk memeberikan warna pada latar belakang */
            background-color: blue;

        }

        #gambar{
            /* border adalah pemeberian batas atau border pada objek  */
            border: 10px solid blue;
            /* opacitty adalah untuk mengatur tingkat transpran */
            opacity: 0.5;
            
        }

        #color2 {
            /* digunakan untuk menjauh dari luar elemen lain */
            margin: 20px;
        }

        #color3 {
            /* padding adalah pemeberian jarak pada elemen dalam */
            padding: 10px;
        }
        #gambar2{
        /* box-shadow untuk digunakan untuk menambahkan bayangan pada elemen */
            border: 10px solid ;
            box-shadow: 5px 5px 10px  green;
        }
        .box{
            /* untuk mengatur  ukuran kotak */
            width: 200px;
            height: 100px;
            color: aqua;
            border: 10px solid blue;
            /* untuk mengatur sudut melengkung   */
            border-radius: 10px;
        }
            </style>
</head>

<body>
    <header>
        <h1>PELATIHAN SELECTOR</h1>
    </header>

   <article>
        <p id="color">pelatihan warna</p>
        <img src="1.png" alt="gambar" height="400" id="gambar">
        <p id="color2">ini adalah pemeberian properti margin</p>
        <p id="color3">ini adalah pemeberian properti padding</p>
        <img src="1.png" alt="gambar" height="400" id="gambar2">
        <div class="box">Hello Tita</div>
        <p>ana</p>
    </article>

</body>

</html>
