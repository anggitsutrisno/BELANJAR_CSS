<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>menyematkan css</title>
    <style>
        p{
            color: blueviolet;
        }
    </style>
</head>
<body>
    <!-- inline css yaitu mnyematkan langsung ke dalam html -->
     <p style="color: aqua;">ini adalah css inline atau langsung</p>
     <!-- internal css yaitu adalah meyematkan didalam head html -->
      <p>ini adalah css yang disematkan kedalam head html</p>
</body>
</html>
