<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position</title>
<style>
    /* statis */
    .box{
    
        width: 100px;
        height: 100px;
        border: 1px solid rgb(14, 13, 13);
        top: 20px;
        left: 200px;
        background-color: blue;
        position: static;
    }
    p{
        height: 200px;
        width: 100px;
    }
    .box2{
        position: relative;
        background-color: chartreuse;
        height: 100px;
        width: 200px;
        top: 50px;
        left: 500px;
        bottom: 2000px;
    }
</style>
</head>

<body>
    <div class="box">haloo</div>
    <p>element ini di posisi statis</p>
    <div class="box2">haloo</div>
</body>
</html>
