<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class dan ID</title>
    <style>
        /* pengguna classs */
        .text-merah {
            color: red;
            text-align: justify;
            font-family: fantasy;
            padding: 10px;
            margin: 10px;
            background-color: black;

        }

        .text-biru {
            color: blue;
            font-family: serif;
            font-size: larger;
            padding: 10px;
            margin: 10px;
            background-color: aquamarine;
        }

        /* pengguna id */
        #paragraf1 {
            color: violet;
            text-align: center;
            background-color: lawngreen;
            padding: 10px;
        }

        #paragraf2 {
            color: cornflowerblue;
            text-align: right;
            background-color: darkorange;
            font-size: 20px;
            margin: 10px;
            padding: 10px;
        }
    </style>
</head>

<body>
    <!-- class ddan id dalam HTML -->
    <P class="text-merah">ini adalah class dalam html</P>
    <P class="text-biru">ini adalah class2 dalam html</P>

    <!-- id dalam html -->
    <p id="paragraf1">ini adalah pemakaian id dalam html</p>
    <p id="paragraf2">ini adalah pemakaian id2 dalam html</p>
</body>

</html>
